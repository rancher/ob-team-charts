{{- if .Values.prometheusProxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: rancher-monitoring-prometheus
  namespace: {{ include "rancher-monitoring.namespace" . }}
  labels:
{{ include "rancher-monitoring.labels" . | indent 4 }}
    app.kubernetes.io/component: prometheus-proxy
spec:
  type: ClusterIP
  ports:
    - name: http-web
      port: 9090
      protocol: TCP
      targetPort: 9090
  selector:
    app.kubernetes.io/name: prometheus
    operator.prometheus.io/name: {{ .Values.prometheusProxy.upstreamService }}
{{- end }}
