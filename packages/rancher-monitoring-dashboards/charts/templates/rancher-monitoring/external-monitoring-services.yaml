{{- define "rancher-monitoring.externalService" -}}
{{- $svcName := index . 0 -}}
{{- $svcPort := index . 1 -}}
{{- $cfg := index . 2 -}}
{{- $labels := index . 3 -}}
{{- $namespace := index . 4 -}}
{{- if $cfg.selector }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svcName }}
  namespace: {{ $namespace }}
  labels:
{{ $labels | indent 4 }}
spec:
  type: ClusterIP
  selector:
{{ $cfg.selector | toYaml | indent 4 }}
  ports:
    - port: {{ $svcPort }}
      targetPort: {{ $cfg.port }}
      protocol: TCP
      name: http
{{- end }}
{{- end -}}

{{- $ns := include "rancher-monitoring.namespace" . }}
{{- $labels := include "rancher-monitoring.labels" . }}
{{- $grafana := .Values.dashboardIntegration.grafana }}
{{- $prometheus := .Values.dashboardIntegration.prometheus }}
{{- $alertmanager := .Values.dashboardIntegration.alertmanager }}

{{- include "rancher-monitoring.externalService" (list "rancher-monitoring-grafana" 80 $grafana $labels $ns) | nindent 0 }}
{{- include "rancher-monitoring.externalService" (list "rancher-monitoring-prometheus" 9090 $prometheus $labels $ns) | nindent 0 }}
{{- include "rancher-monitoring.externalService" (list "rancher-monitoring-alertmanager" 9093 $alertmanager $labels $ns) | nindent 0 }}

