{{- if and .Values.global.rbac.create .Values.global.rbac.userRoles.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-config-admin
  namespace: {{ template "rancher-monitoring.namespace" . }}
  labels: {{ include "rancher-monitoring.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-config-edit
  namespace: {{ template "rancher-monitoring.namespace" . }}
  labels: {{ include "rancher-monitoring.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-config-view
  namespace: {{ template "rancher-monitoring.namespace" . }}
  labels: {{ include "rancher-monitoring.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  verbs:
  - 'get'
  - 'list'
  - 'watch'
{{- end }}
