{{- if .Values.alertmanagerProxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: rancher-monitoring-alertmanager
  namespace: {{ include "rancher-monitoring.namespace" . }}
  labels:
{{ include "rancher-monitoring.labels" . | indent 4 }}
    app.kubernetes.io/component: alertmanager-proxy
spec:
  type: ClusterIP
  ports:
    - name: http-web
      port: 9093
      protocol: TCP
      targetPort: 9093
  selector:
    alertmanager: {{ .Values.alertmanagerProxy.upstreamService }}
    app.kubernetes.io/name: alertmanager
{{- end }}
