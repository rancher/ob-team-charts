{{- $ns := include "rancher-monitoring.namespace" . -}}
{{- $cluster := .Values.global.cattle.clusterId | default "local" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rancher-monitoring.name" . }}-monitoring-proxy-config
  namespace: {{ $ns }}
  labels:
{{ include "rancher-monitoring.labels" . | indent 4 }}
data:
  nginx.conf: |-
    worker_processes      auto;
    error_log             /dev/stdout warn;
    pid                   /var/cache/nginx/nginx.pid;

    events {
       worker_connections 1024;
    }

    http {
      include       /etc/nginx/mime.types;
      log_format    main '[$time_local - $status] $remote_addr - $remote_user $request ($http_referer)';

      proxy_connect_timeout       10;
      proxy_read_timeout          180;
      proxy_send_timeout          5;
      proxy_buffering             off;
      proxy_cache_path            /var/cache/nginx/cache levels=1:2 keys_zone=grafana_zone:100m inactive=1d max_size=10g;

      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }

      {{- if .Values.grafanaProxy.enabled }}
      # Grafana: needs sub_filter to rewrite appSubUrl so static assets resolve
      # under the kube-apiserver service proxy path.
      server {
        listen          8080;
        {{- if ne .Values.global.disableProxyIPv6 true }}
        listen     [::]:8080;
        {{- end }}
        access_log      off;

        gzip            on;
        gzip_min_length 1k;
        gzip_comp_level 2;
        gzip_types      text/plain application/javascript application/x-javascript text/css application/xml text/javascript image/jpeg image/gif image/png;
        gzip_vary       on;
        gzip_disable    "MSIE [1-6]\.";

        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";

        location /api/dashboards {
          proxy_pass     http://{{ .Values.grafanaProxy.upstreamService }}.{{ $ns }}.svc.cluster.local:{{ .Values.grafanaProxy.upstreamPort }};
        }

        location /api/search {
          proxy_pass     http://{{ .Values.grafanaProxy.upstreamService }}.{{ $ns }}.svc.cluster.local:{{ .Values.grafanaProxy.upstreamPort }};
          sub_filter_types application/json;
          sub_filter_once off;
        }

        location /api/live/ {
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $http_host;
          proxy_set_header Accept-Encoding "";
          proxy_pass http://{{ .Values.grafanaProxy.upstreamService }}.{{ $ns }}.svc.cluster.local:{{ .Values.grafanaProxy.upstreamPort }};
        }

        location / {
          proxy_cache         grafana_zone;
          proxy_cache_valid   200 302 1d;
          proxy_cache_valid   301 30d;
          proxy_cache_valid   any 5m;
          proxy_cache_bypass  $http_cache_control;
          add_header          X-Proxy-Cache $upstream_cache_status;
          add_header          Cache-Control "public";

          proxy_pass     http://{{ .Values.grafanaProxy.upstreamService }}.{{ $ns }}.svc.cluster.local:{{ .Values.grafanaProxy.upstreamPort }}/;

          sub_filter_once off;
          {{- if eq .Values.global.cattle.clusterId "local" -}}
          sub_filter '"appSubUrl":""' '"appSubUrl":"{{ .Values.grafanaProxy.proxyPath }}"';
          {{- else -}}
          sub_filter '"appSubUrl":""' '"appSubUrl":"/k8s/clusters/{{ .Values.global.cattle.clusterId }}{{ .Values.grafanaProxy.proxyPath }}"';
          {{- end -}}
          sub_filter ':"/avatar/' ':"avatar/';

          if ($request_filename ~ .*\.(?:js|css|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm)$) {
            expires             90d;
          }

          rewrite ^/k8s/clusters/.*/proxy(.*) /$1 break;
        }
      }
      {{- end }}

      {{- if .Values.prometheusProxy.enabled }}
      # Prometheus: strip Accept-Encoding preemptively (same brotli middleware
      # may land upstream).
      server {
        listen          8090;
        {{- if ne .Values.global.disableProxyIPv6 true }}
        listen     [::]:8090;
        {{- end }}
        access_log      off;

        location / {
          proxy_set_header Accept-Encoding "";
          proxy_set_header Host $host;
          proxy_pass http://{{ .Values.prometheusProxy.upstreamService }}.{{ $ns }}.svc.cluster.local:{{ .Values.prometheusProxy.upstreamPort }};
        }
      }
      {{- end }}

      {{- if .Values.alertmanagerProxy.enabled }}
      # Alertmanager: stripping Accept-Encoding avoids the brotli responses that
      # alertmanager v0.32+ serves, which kube-apiserver's service proxy cannot
      # forward (returns HTTP 500 "stream error ... INTERNAL_ERROR").
      server {
        listen          8093;
        {{- if ne .Values.global.disableProxyIPv6 true }}
        listen     [::]:8093;
        {{- end }}
        access_log      off;

        location / {
          proxy_set_header Accept-Encoding "";
          proxy_set_header Host $host;
          proxy_pass http://{{ .Values.alertmanagerProxy.upstreamService }}.{{ $ns }}.svc.cluster.local:{{ .Values.alertmanagerProxy.upstreamPort }};
        }
      }
      {{- end }}
    }
