apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ .Values.grafana.defaultDashboards.namespace }}
  name: rancher-backup-restore-dashboard
  annotations:
{{ toYaml .Values.grafana.sidecar.dashboards.annotations | indent 4 }}
  labels:
    {{- if $.Values.grafana.sidecar.dashboards.label }}
    {{ $.Values.grafana.sidecar.dashboards.label }}: "1"
    {{- end }}
    app: {{ template "rancher-monitoring.name" $ }}-grafana
{{ include "rancher-monitoring.labels" $ | indent 4 }}
data:
{{ (.Files.Glob "files/rancher/bro/backup-restore.json").AsConfig | indent 2 }}
