{{- /*
This template creates ClusterIP Services with hardcoded names that Rancher Dashboard expects:
- rancher-monitoring-grafana (port 80 → targetPort from values)
- rancher-monitoring-prometheus (port 9090 → targetPort from values)
- rancher-monitoring-alertmanager (port 9093 → targetPort from values)

These services use pod selectors to route traffic to the actual upstream monitoring stack.

DEFAULT BEHAVIOR (kube-prometheus-stack with default release name):
The chart ships with selectors that match kube-prometheus-stack's default labels.
If you install kube-prometheus-stack with release name "kube-prometheus-stack",
these services will automatically connect.

CUSTOM RELEASE NAME:
If you install kube-prometheus-stack with a different release name (e.g., "my-monitoring"),
override the selectors in values.yaml:

  dashboardIntegration:
    prometheus:
      selector:
        app.kubernetes.io/name: prometheus
        operator.prometheus.io/name: my-monitoring-prometheus

To find the correct labels for your installation:

  kubectl get pods -n cattle-monitoring-system -l app.kubernetes.io/name=prometheus --show-labels

LIMITATIONS:
- Services can only target pods in the SAME namespace (cattle-monitoring-system)
- For cross-namespace or external monitoring, use URL-based integration instead

*/ -}}
{{- define "rancher-monitoring.externalService" -}}
{{- $svcName := index . 0 -}}
{{- $svcPort := index . 1 -}}
{{- $cfg := index . 2 -}}
{{- $labels := index . 3 -}}
{{- $namespace := index . 4 -}}
{{- if $cfg.selector }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svcName }}
  namespace: {{ $namespace }}
  labels:
{{ $labels | indent 4 }}
spec:
  type: ClusterIP
  selector:
{{ $cfg.selector | toYaml | indent 4 }}
  ports:
    - port: {{ $svcPort }}
      targetPort: {{ $cfg.port }}
      protocol: TCP
      name: http
{{- end }}
{{- end -}}

{{- $ns := include "rancher-monitoring.namespace" . }}
{{- $labels := include "rancher-monitoring.labels" . }}
{{- $grafana := .Values.dashboardIntegration.grafana }}
{{- $prometheus := .Values.dashboardIntegration.prometheus }}
{{- $alertmanager := .Values.dashboardIntegration.alertmanager }}

{{- include "rancher-monitoring.externalService" (list "rancher-monitoring-grafana" 80 $grafana $labels $ns) | nindent 0 }}
{{- include "rancher-monitoring.externalService" (list "rancher-monitoring-prometheus" 9090 $prometheus $labels $ns) | nindent 0 }}
{{- include "rancher-monitoring.externalService" (list "rancher-monitoring-alertmanager" 9093 $alertmanager $labels $ns) | nindent 0 }}

